name: Database feature matrix

on:
  push:
    branches: [main, wvp-phase-0-parity-audit]
  pull_request:
    branches: [main, wvp-phase-0-parity-audit]

jobs:
  feature-check:
    name: ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: default-sqlite
            args: ""
            description: "Default (SQLite)"
          - feature: sqlite
            args: "--no-default-features --features sqlite"
            description: "SQLite explicit"
          - feature: postgres
            args: "--no-default-features --features postgres"
            description: "PostgreSQL"
          - feature: mysql
            args: "--no-default-features --features mysql"
            description: "MySQL"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Check (${{ matrix.description }})
        run: cargo check ${{ matrix.args }}

  sqlite-integration:
    name: SQLite integration tests
    runs-on: ubuntu-latest
    needs: feature-check
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sqlite-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run sqlite_compat tests
        run: cargo test --features sqlite --test sqlite_compat -- --nocapture