services:
  gbserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: gbserver:latest
    container_name: gbserver
    ports:
      - "3000:3000"
      - "5060:5060/udp"
      - "5061:5061"
    environment:
      WVP__SERVER__HOST: 0.0.0.0
      WVP__SERVER__PORT: 3000
      WVP__SIP__IP: 0.0.0.0
      WVP__SIP__PORT: 5060
      WVP__DATABASE__URL: postgres://postgres:postgrespw@postgres:5432/wvp
      WVP__REDIS__URL: redis://redis:6379
      WVP__JWT__SECRET: ${WVP_JWT_SECRET:-please-change-me-please-change-me}
      WVP__SIP__PASSWORD: ${WVP_SIP_PASSWORD:-please-change-me}
      RUST_LOG: info,wvp_gb28181_server=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zlm:
        condition: service_started
    networks: [wvpnet]
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: wvp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: wvp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init-postgresql-2.7.4.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wvp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [wvpnet]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wvp-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [wvpnet]
    restart: unless-stopped

  zlm:
    image: zlmediakit/zlmediakit:master
    container_name: wvp-zlm
    ports:
      - "8080:8080"
      - "8443:8443"
      - "554:554"
      - "1935:1935"
      - "30000-30100:30000-30100/udp"
    environment:
      ZLM_HTTP_SECRET: 035c73f7-bb6b-4889-a715-d9eb2d1925cc
    networks: [wvpnet]
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}

networks:
  wvpnet:
    driver: bridge
