# PostgreSQL（默认）+ Redis，MySQL 可选，供本地开发/联调使用
# 启动: docker compose up -d
# 停止: docker compose down
# 默认配置下后端连接 postgres://postgres:postgres@127.0.0.1:5432/wvp

services:
  postgres:
    image: postgres:16-alpine
    container_name: wvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wvp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

