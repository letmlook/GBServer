# WVP Rust 后端配置（与 Java 版 application-dev 对应）
server:
  port: 18080

database:
  url: "postgres://postgres:postgres@127.0.0.1:5432/wvp"
  # url: "mysql://root:Fitow2022@127.0.0.1:3306/wvp"

redis:
  url: "redis://127.0.0.1:6379/0"

jwt:
  # 256-bit 随机密钥（请勿泄露，生产环境建议用环境变量 WVP__JWT__SECRET 覆盖）
  secret: "a7f3c9e2b1d84f6a0e8c5b2d9f1a4e7c0b3d6f9a2e5c8b1d4f7a0e3c6b9d2f5"
  expiration_minutes: 30

# 前端静态资源目录：在 GBServer 下执行 cd web && npm run build 后产物在 web/dist
static_dir: "web/dist"

user_settings:
  server_id: "wvp-rust-001"
