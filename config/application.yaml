# WVP Rust 后端配置（与 Java 版 application-dev 对应）
server:
  port: 18080

database:
  url: "postgres://postgres:postgres@127.0.0.1:5432/wvp"
  # url: "mysql://root:Fitow2022@127.0.0.1:3306/wvp"

redis:
  url: "redis://127.0.0.1:6379/0"

jwt:
  # 256-bit 随机密钥（请勿泄露，生产环境建议用环境变量 WVP__JWT__SECRET 覆盖）
  secret: "a7f3c9e2b1d84f6a0e8c5b2d9f1a4e7c0b3d6f9a2e5c8b1d4f7a0e3c6b9d2f5"
  expiration_minutes: 30

# 前端静态资源目录：在 GBServer 下执行 cd web && npm run build 后产物在 web/dist
static_dir: "web/dist"

user_settings:
  server_id: "wvp-rust-001"

# SIP 服务配置
sip:
  enabled: true
  ip: "0.0.0.0"
  port: 5060
  tcp_port: 5061
  device_id: "34020000002000000001"
  password: "admin123"
  realm: "3402000000"
  keepalive_timeout: 30
  register_timeout: 3600
  charset: "UTF-8"
  # SDP 中使用的 IP（NAT 穿透，公网部署时设为公网 IP）
  # sdp_ip: "1.2.3.4"
  # 流地址中使用的 IP（NAT 穿透，公网部署时设为公网 IP）
  # stream_ip: "1.2.3.4"
  stream_reconnect:
    enabled: true
    max_retries: 3
    retry_interval_secs: 5
  heartbeat:
    timeout_multiplier: 3
    check_interval_secs: 10

# ZLM 流媒体服务器配置
zlm:
  servers:
    - id: "zlmediakit-1"
      ip: "127.0.0.1"
      http_port: 8080
      secret: "S63648HLbxckv7YjpPTXXRTOsAVGo0Ia"
      enabled: true
  stream_timeout: 10
  hook_enabled: true
  hook_url: "http://127.0.0.1:18080/api/zlm/hook"
